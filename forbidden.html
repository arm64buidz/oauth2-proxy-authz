    /* ── Card ── */
    .card {
      background: var(--card);
      color: var(--card-foreground);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 1.5rem;
      margin: 0.75rem;
      width: 100%;
      max-width: 28rem;
      text-align: center;
      box-shadow: 0 1px 3px oklch(0% 0 0 / .1), 0 1px 2px oklch(0% 0 0 / .06);
    }

    .card-content {
      padding: 2.5rem 1rem;
    }
    @media (min-width: 640px) {
      .card-content { padding: 2.5rem; }
    }

    /* ── Logo animation ── */
    .icons-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
    }

    .icon-logo {
      background: var(--muted);
      border-radius: 1rem;
      padding: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateX(108px);
      animation: slide-in-left 500ms cubic-bezier(0.4, 0, 1, 1) 200ms forwards;
    }

    .icon-logo img {
      width: 2.5rem;
      height: 2.5rem;
      object-fit: contain;
    }

    .icon-arrow {
      width: 8rem;
      opacity: 1;
      animation: fade-out 300ms ease 200ms forwards;
      flex-shrink: 0;
    }

    .icon-cross {
      background: var(--color-red-200);
      border-radius: 1rem;
      padding: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateX(-108px);
      animation: slide-in-right 500ms cubic-bezier(0.4, 0, 1, 1) 200ms forwards;
    }

    .icon-cross svg {
      width: 1.25rem;
      height: 1.25rem;
      stroke: var(--color-red-600);
      stroke-width: 13px;
      stroke-linecap: round;
      overflow: visible;
    }

    .line1 {
      stroke-dasharray: 107;
      stroke-dashoffset: 107px;
      animation: draw-line 0.15s linear 0.65s both;
    }
    .line2 {
      stroke-dasharray: 107;
      stroke-dashoffset: 107px;
      animation: draw-line 0.2s linear 0.85s both;
    }

    @keyframes slide-in-left {
      to { transform: translateX(0); }
    }
    @keyframes slide-in-right {
      to { transform: translateX(0); }
    }
    @keyframes fade-out {
      to { opacity: 0; }
    }
    @keyframes draw-line {
      to { stroke-dashoffset: 0; }
    }

    /* ── Typography ── */
    h1 {
      font-family: 'Gloock', Georgia, serif;
      font-size: 1.875rem;
      font-weight: 700;
      color: var(--card-foreground);
      margin-top: 1.25rem;
      letter-spacing: -0.025em;
    }
    @media (min-width: 640px) {
      h1 { font-size: 2.25rem; }
    }

    p {
      color: var(--muted-foreground);
      margin-top: 0.5rem;
      margin-bottom: 2.5rem;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    /* ── Button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 2.25rem;
      padding: 0 1rem;
      background: var(--primary);
      color: oklch(98.5% 0 0);
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 9999px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { opacity: 0.8; }
  </style>
</head>
